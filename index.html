<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Gradient Blob</title>
</head>
<body class="bg-[#141414] min-h-screen w-full text-white font-sans selection:bg-[#E50914] selection:text-white overflow-x-hidden">
    
    <!-- Blob Container -->
    <div id="blob-container" class="fixed z-50 top-6 left-6 w-24 h-24 rounded-full hover:scale-105 cursor-pointer transition-all duration-[700ms] ease-[cubic-bezier(0.85,0,0.15,1)]">
        <div id="blob-canvas-wrapper" class="w-full h-full relative">
            <!-- Canvas will be injected here -->
            <div id="blob-logo" class="absolute inset-0 flex items-center justify-center pointer-events-none z-10 transition-opacity duration-200">
                <span class="text-white text-xl font-bold font-sans tracking-tight leading-none"></span>
            </div>
            <button id="close-blob" class="hidden absolute top-8 right-8 text-white/70 hover:text-white z-50 px-4 py-2 bg-black/20 backdrop-blur-md rounded-full border border-white/10">
                <span class="text-sm font-bold uppercase tracking-widest">Close</span>
            </button>
        </div>
    </div>

    <!-- Navigation -->
    <nav id="main-nav" class="fixed top-0 w-full z-40 px-4 md:px-8 py-4 flex items-center justify-between pointer-events-none">
        <div class="w-24 h-24 opacity-0 pointer-events-none"></div>
        <div class="pointer-events-auto absolute left-1/2 top-4 -translate-x-1/2 z-40 transition-all duration-500 delay-100">
           <div class="bg-[#2a2a2a]/60 backdrop-blur-xl border border-white/10 rounded-full p-1.5 flex items-center shadow-lg">
                <button class="nav-tab px-4 py-1.5 rounded-full text-xs md:text-sm font-medium transition-all duration-300 bg-gray-100 text-black shadow-sm" data-tab="Home">Home</button>
                <button class="nav-tab px-4 py-1.5 rounded-full text-xs md:text-sm font-medium transition-all duration-300 text-gray-300 hover:text-white" data-tab="Projects">Projects</button>
                <button class="nav-tab px-4 py-1.5 rounded-full text-xs md:text-sm font-medium transition-all duration-300 text-gray-300 hover:text-white" data-tab="About">About</button>
                <button class="nav-tab px-4 py-1.5 rounded-full text-xs md:text-sm font-medium transition-all duration-300 text-gray-300 hover:text-white" data-tab="Playground">Playground</button>
           </div>
        </div>
        <div class="pointer-events-auto flex items-center justify-end w-12 z-40 transition-opacity duration-300">
           <button class="text-gray-200 hover:text-white transition-colors p-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
           </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="relative z-0 transition-opacity duration-500 delay-75">
        <div class="pt-24 md:pt-32 px-4 md:px-12 flex justify-center pb-8">
            <div class="relative w-full aspect-[4/5] md:aspect-[2.35/1] rounded-3xl overflow-visible group">
                <div class="absolute -inset-10 bg-gradient-to-r from-[#4f46e5] via-[#a855f7] to-[#ec4899] opacity-60 blur-[100px] -z-10 mix-blend-screen animate-pulse duration-[4000ms]"></div>
                <div class="absolute -inset-[1px] rounded-3xl bg-gradient-to-b from-white/20 to-white/5 opacity-100 pointer-events-none z-20"></div>
                <div class="relative w-full h-full rounded-3xl overflow-hidden bg-[#1a1a1a] shadow-[0_0_40px_rgba(0,0,0,0.5)] border border-white/10">
                    <div class="absolute inset-0 w-full h-full">
                        <img src="https://jamesmobbs.com/wp-content/uploads/2024/12/The-Circle-Hero-1920x630.webp" alt="Hero" class="w-full h-full object-cover transition-transform duration-[10s] ease-in-out group-hover:scale-105" referrerPolicy="no-referrer">
                        <div class="absolute inset-0 bg-gradient-to-r from-[#141414] via-[#141414]/30 to-transparent opacity-90"></div>
                        <div class="absolute inset-0 bg-gradient-to-t from-[#141414] via-transparent to-transparent opacity-60"></div>
                        <div class="absolute inset-0 bg-gradient-to-br from-white/10 to-transparent opacity-30 pointer-events-none"></div>
                    </div>
                    <div class="relative z-30 h-full flex flex-col justify-end p-8 md:p-16 space-y-6 md:w-2/3">
                        <h1 class="text-4xl md:text-6xl lg:text-7xl font-black text-white leading-none tracking-tight drop-shadow-2xl">THE CIRCLE</h1>
                        <p class="text-sm md:text-base text-gray-200 max-w-lg line-clamp-3 font-medium leading-relaxed drop-shadow-md text-shadow">
                          A comprehensive design exploration for the hit social media competition. 
                          Creating an immersive graphical language that defines the bridge between digital persona and reality.
                        </p>
                        <div class="flex items-center gap-3 pt-4">
                           <button class="spotlight-button group relative overflow-hidden rounded-full bg-white/10 border border-white/10 px-8 py-3.5 transition-all duration-300 hover:bg-white/10 hover:scale-105 active:scale-95 hover:border-white/20 hover:shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                                <div class="spotlight-effect pointer-events-none absolute -inset-px opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                                <div class="relative flex items-center gap-3 text-white font-bold tracking-wide text-sm md:text-base">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                                    </svg>
                                    <span>View Case Study</span>
                                </div>
                           </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-4 md:px-12 py-8 space-y-12 pb-24">
            <section>
              <h3 class="text-lg md:text-xl font-bold text-gray-100 mb-4 pl-1 border-l-4 border-[#E50914] leading-none">Latest Projects</h3>
              <div class="relative w-full overflow-x-auto pb-8 hide-scrollbar">
                 <div id="projects-list" class="flex gap-4 min-w-max">
                    <!-- Projects will be injected here -->
                 </div>
              </div>
            </section>
        </div>
    </main>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .text-shadow { text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    </style>

    <script type="module" src="/main.ts"></script>
</body>
</html>
